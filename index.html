<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>День Слизерина 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(180deg, #f3fff6 0%, #d9fbe8 50%, #c8f7dc 100%);
      overflow: hidden;
    }

    h1 {
      font-size: 44px;
      text-align: center;
      margin-bottom: 10px;
      line-height: 1.1;
    }

    .labubu-text {
      display: inline-block;
      font-weight: 900;
      background: linear-gradient(180deg, #8df5c6, #3edfa3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
    }

    .labubu-text::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
      background: linear-gradient(180deg, #ffffff, rgba(255,255,255,0));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0.6;
      transform: translateY(-2px);
    }

    /* подсказка */
    .hint {
      position: absolute;
      right: 8%;
      top: 60%;
      font-family: 'Patrick Hand', cursive;
      font-size: 24px;
      color: #3f6f5c;
      transform: rotate(-12deg);
      transition: opacity 0.3s;
    }

    .hint.hide { opacity: 0; }

    /* нормальная стрелка */
    .arrow {
      position: absolute;
      right: 12%;
      top: 62%;
      width: 120px;
      height: 120px;
      transform: rotate(25deg);
    }

    .arrow::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border: 3px solid #3f6f5c;
      border-top: none;
      border-left: none;
      border-radius: 0 0 100px 0;
    }

    .arrow::after {
      content: '';
      position: absolute;
      right: -6px;
      bottom: -6px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 16px solid #3f6f5c;
      transform: rotate(45deg);
    }

    .arrow.hide { opacity: 0; }

    .scene {
      position: relative;
      width: 700px;
      height: 700px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #pack, #toy {
      position: absolute;
      width: 600px;
      transition: all 0.5s ease;
    }

    #pack.disabled {
      pointer-events: none;
      opacity: 0;
    }

    .shake {
      animation: shake 0.5s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-15px); }
      50% { transform: translateX(15px); }
      75% { transform: translateX(-15px); }
      100% { transform: translateX(0); }
    }

    #toy {
      opacity: 0;
      transform: scale(0.5);
      filter: drop-shadow(0 30px 60px rgba(0,0,0,0.2));
    }

    #toy.show {
      opacity: 1;
      transform: scale(1);
    }

    /* инфо */
    .info {
      position: absolute;
      left: 5%;
      bottom: 10%;
      max-width: 320px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease;
    }

    .info.show {
      opacity: 1;
      transform: translateY(0);
    }

    .info h2 {
      font-size: 42px;
      margin: 0 0 10px;
    }

    .info p {
      font-size: 20px;
      color: #2e5e4c;
    }

    /* пузырьки как раньше (много, мелкие) */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.8), rgba(200,255,230,0.3));
      animation: float 8s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-40px); }
      100% { transform: translateY(0); }
    }

    .b1 { width: 60px; height: 60px; top: 10%; left: 20%; }
    .b2 { width: 40px; height: 40px; bottom: 15%; right: 25%; }
    .b3 { width: 80px; height: 80px; top: 30%; right: 10%; }
    .b4 { width: 30px; height: 30px; top: 70%; left: 15%; }
    .b5 { width: 50px; height: 50px; top: 50%; left: 80%; }
    .b6 { width: 25px; height: 25px; bottom: 20%; left: 40%; }
    .b7 { width: 70px; height: 70px; top: 15%; left: 60%; }
    .b8 { width: 35px; height: 35px; bottom: 5%; right: 5%; }

  </style>
</head>
