<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Labubu</title>

<style>
@font-face {
  font-family: "Bubbles";
  src: url("fonts/bubbles.woff2") format("woff2");
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  height: 100vh;
  display: flex;
  background: linear-gradient(180deg,#f8fffb,#eefaf3,#e6f5ee);
  overflow: hidden;
}

.left, .right {
  width: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.right {
  flex-direction: column;
  text-align: center;
  padding: 80px;
}

h1 { font-size: 42px; }

.labubu-text {
  display: inline-flex;
  gap: 6px;
  font-family: "Bubbles";
  font-size: 64px;
  flex-wrap: wrap;
  justify-content: center;
}

.labubu-text span {
  padding: 0 4px;
  background: linear-gradient(180deg,#ff9de6,#ff5ccf);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.scene {
  position: relative;
  width: 500px;
  height: 500px;
}

#pack {
  position: absolute;
  width: 400px;
  cursor: pointer;
  z-index: 10;
  transition: transform 0.2s;
}

#toy {
  position: absolute;
  width: 450px;
  opacity: 0;
  transform: scale(0.5);
  z-index: 5;
  transition: all 0.5s ease;
}

#toy.show {
  opacity: 1;
  transform: scale(1);
}

/* стрелка */
.arrow-img {
  position: absolute;
  width: 140px;
  top: -40px;
  left: 50%;
  transform: translateX(-50%);
  cursor: pointer;
  z-index: 20;
}

/* ТРЯСКА */
.shake {
  animation: shake 0.5s;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  50% { transform: translateX(10px); }
  75% { transform: translateX(-10px); }
  100% { transform: translateX(0); }
}

/* ХОВЕР ТРЯСКА */
#pack:hover {
  animation: shake 0.4s;
}

.hidden { display:none; }

</style>
</head>

<body>

<div class="left">
  <div class="scene">
    <img id="pack" src="pack.png">
    <img id="arrow" class="arrow-img" src="arrow.png">
    <img id="toy">
  </div>
</div>

<div class="right" id="defaultText">
  <h1>
    Какая<br>
    <span class="labubu-text">
      <span>Л</span><span>А</span><span>Б</span><span>У</span><span>Б</span><span>А</span>
    </span><br>
    попадётся тебе?
  </h1>
</div>

<div class="right hidden" id="labubuInfo">
  <h1 id="newTitle" class="labubu-text"></h1>
  <p id="newDesc"></p>
</div>

<script>
const pack = document.getElementById("pack");
const arrow = document.getElementById("arrow");
const toy = document.getElementById("toy");

const defaultText = document.getElementById("defaultText");
const info = document.getElementById("labubuInfo");
const newTitle = document.getElementById("newTitle");
const newDesc = document.getElementById("newDesc");

let opened = false;

const toys = [
  {img:"toys/1.png", title:"ШАХМАТИСТ", desc:"Умный стратег"},
  {img:"toys/2.png", title:"ДУЭЛЯНТ", desc:"Маг-воин"},
  {img:"toys/3.png", title:"РОМАНТИК", desc:"Милый герой"}
];

function openPack(){
  if(opened) return;
  opened = true;

  pack.classList.add("shake");

  setTimeout(()=>{
    const random = toys[Math.floor(Math.random()*toys.length)];
    toy.src = random.img;

    defaultText.classList.add("hidden");
    info.classList.remove("hidden");

    newTitle.innerHTML = random.title
      .split("")
      .map(l=>`<span>${l}</span>`).join("");

    newDesc.textContent = random.desc;

    toy.classList.add("show");
    arrow.style.display="none";

  }, 400);
}

pack.onclick = openPack;
arrow.onclick = openPack;

</script>

</body>
</html>
