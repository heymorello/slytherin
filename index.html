<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>День Слизерина 2026</title>

  <style>
    @font-face {
      font-family: "Bubbles";
      src: url("fonts/bubbles.woff2") format("woff2");
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      position: relative;

      background: linear-gradient(
        180deg,
        #f8fffb 0%,
        #eefaf3 50%,
        #e6f5ee 100%
      );

      overflow: hidden;
    }

    .left {
      width: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 5;
    }

    .right {
      width: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 100px;
      z-index: 2;
    }

    h1 {
      font-size: 42px;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    /* LABUBU текст */
    .labubu-text {
      display: inline-flex;
      gap: 6px; /* уменьшили */
      font-family: "Bubbles", cursive;
      font-size: 72px;
      line-height: 1.1;
      flex-wrap: wrap; /* чтобы не ломалось */
      justify-content: center;
    }

    .labubu-text span {
      display: inline-block;
      padding: 0 4px; /* уменьшили */

      background: linear-gradient(180deg, #ff9de6, #ff5ccf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
    }

    .labubu-text span:nth-child(1) { transform: translateY(-10px) rotate(-6deg); }
    .labubu-text span:nth-child(2) { transform: translateY(12px) rotate(5deg); }
    .labubu-text span:nth-child(3) { transform: translateY(-8px) rotate(-4deg); }
    .labubu-text span:nth-child(4) { transform: translateY(14px) rotate(7deg); }
    .labubu-text span:nth-child(5) { transform: translateY(-10px) rotate(-5deg); }
    .labubu-text span:nth-child(6) { transform: translateY(8px) rotate(6deg); }

    p {
      color: #1C1C1C;
      font-size: 20px;
      line-height: 1.6;
    }

    .scene {
      position: relative;
      width: 600px;
      height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #pack {
      position: absolute;
      width: 500px;
      z-index: 10;
      cursor: pointer;
      transition: all 0.5s ease;
    }

    #pack:hover:not(.disabled) {
  animation: shake 0.5s;
}

    #toy {
      position: absolute;
      width: 600px;
      opacity: 0;
      transform: scale(0.5);
      z-index: 2;
      transition: all 0.5s ease;
    }

    #toy.show {
      opacity: 1;
      transform: scale(1);
    }

    /* СТРЕЛКА */
    .arrow-img {
      position: absolute;
      width: 250px;
      top: 30px;
      left: 80%;
      transform: translateX(-50%) rotate(-10deg);
      z-index: 20;
      cursor: pointer;
    }

    #pack.disabled {
      pointer-events: none;
      opacity: 0;
      transform: scale(0.7);
    }

    .shake {
      animation: shake 0.5s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-12px); }
      50% { transform: translateX(12px); }
      75% { transform: translateX(-12px); }
      100% { transform: translateX(0); }
    }

    .hidden {
      display: none;
    }

    /* Пузырьки */
    .bubble {
      position: absolute;
      border-radius: 50%;
      z-index: 1;

      background: radial-gradient(
        circle at 30% 30%,
        rgba(255,255,255,0.95),
        rgba(210,235,255,0.6),
        rgba(180,220,255,0.4),
        rgba(255,210,245,0.35),
        rgba(255,255,255,0.2)
      );

      backdrop-filter: blur(4px);

      box-shadow:
        inset 0 0 14px rgba(255,255,255,0.9),
        0 0 20px rgba(200,220,255,0.4),
        0 0 35px rgba(255,200,240,0.25);

      animation: float 10s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-70px) scale(1.15); }
      100% { transform: translateY(0) scale(1); }
    }

    .b1 { width: 120px; height: 120px; top: 5%; left: 10%; animation-delay: 3s; }
    .b2 { width: 70px; height: 70px; bottom: 10%; right: 20%; animation-delay: 6s; }
    .b3 { width: 140px; height: 140px; top: 30%; right: 5%; animation-delay: 4s; }
    .b4 { width: 60px; height: 60px; top: 70%; left: 15%; animation-delay: 3s; }
    .b5 { width: 90px; height: 90px; top: 50%; left: 80%; animation-delay: 4s; }
    .b6 { width: 50px; height: 50px; bottom: 20%; left: 40%; animation-delay: 5s; }
    .b7 { width: 130px; height: 130px; top: 15%; left: 60%; animation-delay: 2.5s; }
    .b8 { width: 55px; height: 55px; bottom: 5%; right: 5%; animation-delay: 1.5s; }
    .b9 { width: 120px; height: 120px; bottom: 20%; right: 90%; animation-delay: 2s; }
    .b10 { width: 70px; height: 70px; bottom: 60%; right: 75%; animation-delay: 7s; }

  </style>
</head>
<body>

  <!-- пузырьки -->
  <div class="bubble b1"></div>
  <div class="bubble b2"></div>
  <div class="bubble b3"></div>
  <div class="bubble b4"></div>
  <div class="bubble b5"></div>
  <div class="bubble b6"></div>
  <div class="bubble b7"></div>
  <div class="bubble b8"></div>
  <div class="bubble b9"></div>
  <div class="bubble b10"></div>

  <div class="left">
    <div class="scene">
      <img id="pack" src="pack.png" />
      <img src="arrow.png" class="arrow-img" id="arrow" />
      <img id="toy" src="" />
    </div>
  </div>

  <div class="right" id="defaultText">
    <h1>
      Какая<br>
      <span class="labubu-text">
        <span>Л</span><span>А</span><span>Б</span><span>У</span><span>Б</span><span>А</span>
      </span><br>
      попадётся тебе?
    </h1>
    <p>Слизерин ассоциируется с роскошью...</p>
  </div>

  <div class="right hidden" id="labubuInfo">
    <h1 id="newTitle" class="labubu-text"></h1>
    <p id="newDesc"></p>
  </div>

  <script>
document.addEventListener("DOMContentLoaded", () => {

  const pack = document.getElementById("pack");
  const toy = document.getElementById("toy");
  const arrow = document.getElementById("arrow");

  const defaultText = document.getElementById("defaultText");
  const labubuInfo = document.getElementById("labubuInfo");
  const newTitle = document.getElementById("newTitle");
  const newDesc = document.getElementById("newDesc");

  const toys = [
    { img: "toys/1.png", title: "ШАХМАТИСТ", desc: "..." },
    { img: "toys/2.png", title: "ДУЭЛЯНТ", desc: "..." },
    { img: "toys/3.png", title: "ЕГИПТОЛОГ", desc: "..." }
  ];

  let opened = false;

  function openPack() {
  if (opened) return;
  opened = true;

  // перезапуск анимации (если вдруг уже была)
  pack.classList.remove("shake");
  void pack.offsetWidth; // магия для перезапуска CSS-анимации
  pack.classList.add("shake");

  setTimeout(() => {
    const random = toys[Math.floor(Math.random() * toys.length)];

    toy.src = random.img;

    defaultText.classList.add("hidden");
    labubuInfo.classList.remove("hidden");

    newTitle.innerHTML = random.title
      .split("")
      .map(letter => `<span>${letter}</span>`)
      .join("");

    newDesc.textContent = random.desc;

    arrow.classList.add("hidden");
    pack.classList.remove("shake");
    pack.classList.add("disabled");

    toy.classList.add("show");
  }, 500); // совпадает с длительностью shake
  }

  pack.addEventListener("click", openPack);
  arrow.addEventListener("click", openPack);

});
</script>

</body>
</html>
