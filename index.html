<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>День Слизерина 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(180deg, #f3fff6 0%, #d9fbe8 50%, #c8f7dc 100%);
      overflow: hidden;
    }

    h1 {
      font-size: 44px;
      text-align: center;
      margin-bottom: 10px;
      line-height: 1.1;
    }

    .labubu-text {
      display: inline-block;
      font-weight: 900;
      background: linear-gradient(180deg, #8df5c6, #3edfa3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
    }

    .labubu-text::after {
      content: 'ЛАБУБУ';
      position: absolute;
      left: 0;
      top: 0;
      background: linear-gradient(180deg, #ffffff, rgba(255,255,255,0));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0.6;
      transform: translateY(-2px);
    }

    /* РИСОВАННЫЙ ТЕКСТ */
    .hint {
      position: absolute;
      right: 10%;
      top: 55%;
      font-family: 'Patrick Hand', cursive;
      font-size: 22px;
      color: #3f6f5c;
      transform: rotate(-10deg);
    }

    .arrow {
      position: absolute;
      right: 15%;
      top: 60%;
      width: 120px;
      height: 120px;
      border-right: 3px solid #3f6f5c;
      border-bottom: 3px solid #3f6f5c;
      border-radius: 0 0 100px 0;
      transform: rotate(20deg);
    }

    .scene {
      position: relative;
      width: 700px;
      height: 700px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #pack, #toy {
      position: absolute;
      width: 600px;
      transition: all 0.5s ease;
    }

    #pack {
      cursor: pointer;
      z-index: 2;
    }

    #pack.disabled {
      pointer-events: none;
      opacity: 0;
      transform: scale(0.7);
    }

    .shake {
      animation: shake 0.5s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-15px); }
      50% { transform: translateX(15px); }
      75% { transform: translateX(-15px); }
      100% { transform: translateX(0); }
    }

    #toy {
      opacity: 0;
      transform: scale(0.5);
      filter: drop-shadow(0 30px 60px rgba(0,0,0,0.2));
    }

    #toy.show {
      opacity: 1;
      transform: scale(1);
    }

    /* описание */
    .info {
      position: absolute;
      left: 5%;
      bottom: 10%;
      max-width: 260px;
      font-family: 'Patrick Hand', cursive;
      color: #2e5e4c;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease;
    }

    .info.show {
      opacity: 1;
      transform: translateY(0);
    }

    .info h2 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    /* пузыри */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(120,255,200,0.4), rgba(200,255,230,0.3));
      backdrop-filter: blur(4px);
      box-shadow: inset 0 0 12px rgba(255,255,255,0.9), 0 0 25px rgba(120,255,200,0.4);
      animation: float 10s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-80px) scale(1.2); }
      100% { transform: translateY(0) scale(1); }
    }

    .b1 { width: 150px; height: 150px; top: 5%; left: 10%; }
    .b2 { width: 90px; height: 90px; bottom: 10%; right: 20%; }
    .b3 { width: 170px; height: 170px; top: 30%; right: 5%; }

  </style>
</head>
<body>

  <div class="bubble b1"></div>
  <div class="bubble b2"></div>
  <div class="bubble b3"></div>

  <h1>
    Какой <span class="labubu-text">ЛАБУБУ</span><br>
    достанется именно тебе?
  </h1>

  <div class="hint">открой коробку</div>
  <div class="arrow"></div>

  <div class="scene">
    <img id="pack" src="pack.png" alt="pack" />
    <img id="toy" src="" alt="toy" />
  </div>

  <div class="info" id="info">
    <h2 id="toyName"></h2>
    <p id="toyDesc"></p>
  </div>

  <script>
    const pack = document.getElementById("pack");
    const toy = document.getElementById("toy");
    const info = document.getElementById("info");
    const toyName = document.getElementById("toyName");
    const toyDesc = document.getElementById("toyDesc");

    const toys = [
      {img:"toys/1.png", name:"Bubble Labubu", desc:"Любит мечтать и пускать пузырьки"},
      {img:"toys/2.png", name:"Sweet Labubu", desc:"Обожает сладкое и веселье"},
      {img:"toys/3.png", name:"Cool Labubu", desc:"Самый стильный в коллекции"},
      {img:"toys/4.png", name:"Dreamy Labubu", desc:"Живёт в облаках"},
      {img:"toys/5.png", name:"Shiny Labubu", desc:"Любит всё блестящее"},
      {img:"toys/6.png", name:"Lazy Labubu", desc:"Просто отдыхает"},
      {img:"toys/7.png", name:"Sport Labubu", desc:"Всегда в движении"},
      {img:"toys/8.png", name:"Magic Labubu", desc:"Немного волшебства"},
      {img:"toys/9.png", name:"Cute Labubu", desc:"Слишком милый"},
      {img:"toys/10.png", name:"Rare Labubu", desc:"Редкий гость"},
      {img:"toys/11.png", name:"Star Labubu", desc:"Сияет ярче всех"},
      {img:"toys/12.png", name:"Night Labubu", desc:"Любит ночь"},
      {img:"toys/13.png", name:"Sunny Labubu", desc:"Всегда как солнце"},
      {img:"toys/14.png", name:"Soft Labubu", desc:"Самый нежный"},
      {img:"toys/15.png", name:"Legend Labubu", desc:"Легенда коллекции"}
    ];

    let opened = false;

    pack.addEventListener("click", () => {
      if (opened) return;
      opened = true;

      pack.classList.add("shake");

      setTimeout(() => {
        const random = toys[Math.floor(Math.random() * toys.length)];
        toy.src = random.img;

        toyName.textContent = random.name;
        toyDesc.textContent = random.desc;

        pack.classList.remove("shake");
        pack.classList.add("disabled");

        toy.classList.add("show");
        info.classList.add("show");
      }, 500);
    });
  </script>

</body>
</html>
